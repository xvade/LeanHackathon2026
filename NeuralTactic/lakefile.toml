name = "NeuralTactic"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["NeuralTactic"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0-rc2"

[[require]]
name = "aesop_with_overrides"
path = "../aesop_with_overrides"

[[lean_lib]]
name = "NeuralTactic"
